kind = "web"
previewPath = "/"
title = "GUSI Restaurant"
version = "1.0.0"
id = "artifacts/gusi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23646

[services.development]
run = "pnpm --filter @workspace/gusi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gusi", "run", "build" ]
publicDir = "artifacts/gusi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23646"
BASE_PATH = "/"
